services:
  postgres:
    image: postgres:16
    container_name: cs2lab-postgres
    environment:
      POSTGRES_USER: cs2
      POSTGRES_PASSWORD: cs2
      POSTGRES_DB: cs2_lab
    ports:
      - "5544:5432"
    volumes:
      - cs2lab_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cs2 -d cs2_lab"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    container_name: cs2lab-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
    image: cs2lab-backend
    environment:
      DATABASE_URL: postgresql+psycopg://cs2:cs2@postgres:5432/cs2_lab
      REDIS_URL: redis://redis:6379/0
      CORS_ORIGINS: '["http://localhost:3000"]'
    command: >
      sh -c "uv run alembic upgrade head && uv run uvicorn app.main:app --host 0.0.0.0 --port 8000"
    ports:
      - "8000:8000"
    volumes:
      - cs2lab_data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    image: cs2lab-backend
    environment:
      DATABASE_URL: postgresql+psycopg://cs2:cs2@postgres:5432/cs2_lab
      REDIS_URL: redis://redis:6379/0
    command: uv run python -m app.workers.run_worker
    volumes:
      - cs2lab_data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_started

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    image: cs2lab-frontend
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      api:
        condition: service_started

volumes:
  cs2lab_pgdata:
  cs2lab_data:
